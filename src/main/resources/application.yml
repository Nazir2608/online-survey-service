spring:
  application:
    name: online-survey-service

  profiles:
    active: dev   # override with -Dspring.profiles.active=prod

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# App-specific settings
app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_USE_256_BIT_KEY_AT_MINIMUM}
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days

  pagination:
    default-page-size: 20
    max-page-size: 50

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: online-survey-service
    version: '@project.version@'
    description: Production-ready Online Survey REST API
