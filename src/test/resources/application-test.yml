spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-for-integration-tests-only-32chars!!
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.nazir.onlinesurveyservice: INFO
