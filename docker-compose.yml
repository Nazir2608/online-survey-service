services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: survey_postgres
    environment:
      POSTGRES_DB:       survey_db
      POSTGRES_USER:     survey_user
      POSTGRES_PASSWORD: survey_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_user -d survey_db"]
      interval: 10s
      timeout: 5s
      retries: 5

#  # ─── PgAdmin (optional DB GUI) ────────────────────────────────
#  pgadmin:
#    image: dpage/pgadmin4:latest
#    container_name: survey_pgadmin
#    environment:
#      PGADMIN_DEFAULT_EMAIL:    admin@survey.local
#      PGADMIN_DEFAULT_PASSWORD: admin
#    ports:
#      - "5050:80"
#    depends_on:
#      postgres:
#        condition: service_healthy
#    volumes:
#      - pgadmin_data:/var/lib/pgadmin

  # ─── Spring Boot App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: survey_app
    environment:
      SPRING_PROFILES_ACTIVE:     prod
      DATABASE_URL:               jdbc:postgresql://postgres:5432/survey_db
      DATABASE_USERNAME:          survey_user
      DATABASE_PASSWORD:          survey_pass
      JWT_SECRET:                 REPLACE_WITH_A_STRONG_256_BIT_SECRET_KEY_HERE_!!
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  pgadmin_data:
